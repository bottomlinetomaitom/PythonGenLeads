# Usage:
#   docker compose run --rm engine urls.txt --export both
#   docker compose run --rm engine urls.txt --workers 10
#
# To enable local AI scoring, uncomment the `ollama` service and set
# OLLAMA_HOST so the engine can reach it.

services:
  engine:
    build: .
    image: sovereign-lead-engine:latest
    volumes:
      - ./data:/data            # leads.db, exports, pipeline.log, urls.txt
    environment:
      - OLLAMA_MODEL=llama3
      # - OLLAMA_HOST=http://ollama:11434
